<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
</head>

<body>

    <img src="Black Wallpaper PC.jpg" class="img-fluid" alt="Responsive image">
    <h1>Bootstrap Heading 1</h1>
    <p class="lead">This is a lead paragraph for prominent text.</p>
    <button type="button" class="btn btn-primary">Primary Button</button> <!--her btn is providing button size, color, padding , margin etc.-->
    
    <button type="button" class="btn btn-secondary">Secondary Button</button>
    <button type="button" class="btn btn-success">Success Button</button>
    <button type="button" class="btn btn-danger">Danger Button</button>
    <button type="button" class="btn btn-sm">Small Button</button>
    <button type="button" class="btn btn-outline-secondary">Secondary Button</button>

    <button type="button" class="btn btn-primary">
        Notifications<span class="badge bg-danger">4</span>
    </button>"

    <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="download (8).jpg" class="d-block w-100" alt="Slide 1">
          </div>
          <div class="carousel-item">
            <img src="Silly lil fella.jpg" class="d-block w-100" alt="Slide 2">
          </div>
          <div class="carousel-item">
            <img src="lord krishna.jpg" class="d-block w-100" alt="Slide 3">
          </div>
        </div>
      </div>

      <div class="progress">
        <div class="progress-bar" role="progressbar" style="width: 75%;" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">75%</div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
